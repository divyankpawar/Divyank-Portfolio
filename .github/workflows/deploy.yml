name: Deploy portfolio to GitHub Pages

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Build portfolio for GitHub Pages
        run: npm run build
        env:
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Create static Pages entry files
        run: node scripts/create-github-pages-index.mjs
        env:
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload built portfolio
        uses: actions/upload-pages-artifact@v5
        with:
          path: .output/public

  deploy:
    name: Deploy portfolio
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
